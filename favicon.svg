<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00a8cc"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1f2e"/>
      <stop offset="100%" stop-color="#0a0f14"/>
    </radialGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Letra G bold en cian -->
  <text x="5" y="24" font-family="Arial Black, sans-serif" font-weight="900" font-size="24" fill="url(#g1)">G</text>
  <!-- Punto de ubicación pequeño -->
  <circle cx="26" cy="8" r="3.5" fill="#00e5ff" opacity="0.9"/>
  <circle cx="26" cy="8" r="1.5" fill="#0a0f14"/>
</svg>
