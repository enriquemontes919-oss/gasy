<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080c10">
<meta name="description" content="Gasy — Encuentra la gasolina más barata cerca de ti en México">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gasy">
<title>Gasy — Gasolina inteligente</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --bg:       #080c10;
  --bg2:      #0d1318;
  --bg3:      #111820;
  --bg4:      #16202a;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --accent:   #00e5ff;
  --accent2:  #0099bb;
  --accent-glow: rgba(0,229,255,0.15);
  --green:    #00e676;
  --green-bg: rgba(0,230,118,0.1);
  --amber:    #ffab00;
  --amber-bg: rgba(255,171,0,0.1);
  --red:      #ff1744;
  --red-bg:   rgba(255,23,68,0.1);
  --text:     #e8edf2;
  --text2:    #7a8fa0;
  --text3:    #3d5060;
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Outfit', sans-serif;
  --r:        12px;
  --r-lg:     18px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: var(--sans); color: var(--text); }

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
  transition: opacity 0.5s ease;
}
#loading.out { opacity: 0; pointer-events: none; }
.load-logo { font-family: var(--sans); font-weight: 800; font-size: 56px; letter-spacing: -2px; }
.load-logo em { color: var(--accent); font-style: normal; }
.load-logo span { color: var(--text); }
.load-ring {
  width: 48px; height: 48px; border-radius: 50%;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt { font-size: 13px; color: var(--text2); letter-spacing: 0.08em; font-weight: 500; }
.load-bar-wrap { width: 160px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.load-bar { height: 100%; width: 0; background: var(--accent); border-radius: 1px; transition: width 0.4s ease; box-shadow: 0 0 8px var(--accent); }

/* ── HEADER ── */
#hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  height: 58px;
  background: rgba(8,12,16,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
}
#logo {
  font-family: var(--sans); font-weight: 800; font-size: 22px; letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
}
#logo em { color: var(--accent); font-style: normal; }
#logo span { color: var(--text); }
.logo-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

/* Fuel selector */
#fuel-wrap {
  display: flex; align-items: center;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 30px; overflow: hidden;
  padding: 3px;
}
.fbtn {
  padding: 5px 13px; font-size: 12px; font-weight: 600; cursor: pointer;
  border: none; background: transparent; color: var(--text2);
  font-family: var(--sans); border-radius: 20px; transition: all 0.2s; white-space: nowrap;
}
.fbtn.on { background: var(--accent); color: var(--bg); }

/* ── MAP ── */
#map { position: fixed; top: 58px; left: 0; right: 0; bottom: 200px; z-index: 1; }
.leaflet-tile-pane { filter: brightness(0.35) saturate(0.4) hue-rotate(180deg); }
.leaflet-control-attribution { display: none !important; }
.leaflet-control-zoom { border: none !important; margin-right: 14px !important; margin-bottom: 14px !important; }
.leaflet-control-zoom a {
  background: var(--bg3) !important; color: var(--accent) !important;
  border: 1px solid var(--border2) !important;
  border-radius: 8px !important; width: 32px !important; height: 32px !important;
  line-height: 32px !important; font-size: 16px !important;
  backdrop-filter: blur(10px) !important;
}
.leaflet-popup-content-wrapper {
  background: var(--bg3) !important; color: var(--text) !important;
  border: 1px solid var(--border2) !important; border-radius: 14px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px var(--border) !important;
  padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-close-button { color: var(--text2) !important; top: 10px !important; right: 12px !important; font-size: 18px !important; }

/* ── POPUP ── */
.pop { padding: 14px 16px; min-width: 180px; font-family: var(--sans); }
.pop-brand { font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
.pop-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px; line-height: 1.3; }
.pop-prices { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.pop-row { display: flex; justify-content: space-between; align-items: center; }
.pop-fuel { font-size: 12px; color: var(--text2); }
.pop-val { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--accent); }
.pop-addr { font-size: 11px; color: var(--text3); line-height: 1.4; border-top: 1px solid var(--border); padding-top: 8px; }

/* ── GPS BUTTON ── */
#gpsbtn {
  position: fixed; right: 16px; bottom: 216px; z-index: 400;
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 var(--border2);
}
#gpsbtn:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(0,229,255,0.2); }
#gpsbtn:active { transform: scale(0.92); }
#gpsbtn svg { width: 20px; height: 20px; }

/* ── LEGEND ── */
#legend {
  position: fixed; left: 14px; bottom: 216px; z-index: 400;
  background: rgba(13,19,24,0.9); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 10px 12px; display: flex; flex-direction: column; gap: 6px;
}
.leg { display: flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 500; color: var(--text2); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── BOTTOM PANEL ── */
#panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
  background: rgba(11,16,21,0.97);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 12px 16px 32px;
  height: 200px;
}
#panel-handle { width: 32px; height: 3px; background: var(--border2); border-radius: 2px; margin: 0 auto 12px; }

/* Stats row */
#stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 12px;
}
.stat {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r); padding: 8px 10px;
  display: flex; flex-direction: column; gap: 2px;
}
.stat-label { font-size: 9px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }
.stat-val { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--accent); }
.stat-sub { font-size: 10px; color: var(--text2); }

/* Cards list */
#cards {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px;
  scrollbar-width: none;
}
#cards::-webkit-scrollbar { display: none; }
.card {
  min-width: 130px; flex-shrink: 0;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r); padding: 10px 12px;
  cursor: pointer; transition: all 0.2s;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: transparent; transition: background 0.2s;
}
.card:hover { border-color: var(--border2); background: var(--bg4); }
.card.sel { border-color: var(--accent); background: var(--bg4); }
.card.sel::before { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.card-brand { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3px; }
.card-price { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--text); line-height: 1; }
.card-price-unit { font-size: 10px; color: var(--text2); font-family: var(--sans); font-weight: 400; }
.card-dist { font-size: 10px; color: var(--text2); margin-top: 4px; }
.card-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 9px; font-weight: 700; padding: 2px 6px;
  border-radius: 20px; margin-top: 5px; letter-spacing: 0.04em;
}
.badge-g { background: var(--green-bg); color: var(--green); }
.badge-a { background: var(--amber-bg); color: var(--amber); }
.badge-r { background: var(--red-bg); color: var(--red); }

/* ── USER MARKER ── */
.umarker {
  width: 20px; height: 20px; position: relative;
}
.umarker-dot {
  width: 14px; height: 14px; background: var(--accent); border-radius: 50%;
  border: 2px solid var(--bg); position: absolute; top: 3px; left: 3px;
  box-shadow: 0 0 0 3px rgba(0,229,255,0.25);
  animation: upulse 2s ease-out infinite;
}
@keyframes upulse {
  0% { box-shadow: 0 0 0 0 rgba(0,229,255,0.4); }
  70% { box-shadow: 0 0 0 10px rgba(0,229,255,0); }
  100% { box-shadow: 0 0 0 0 rgba(0,229,255,0); }
}

/* ── NO GPS ── */
#nogps {
  display: none; position: fixed; inset: 0; z-index: 800;
  background: rgba(8,12,16,0.95);
  backdrop-filter: blur(20px);
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; padding: 40px; text-align: center;
}
#nogps.show { display: flex; }
.nogps-icon { font-size: 48px; margin-bottom: 4px; }
#nogps h2 { font-size: 22px; font-weight: 700; color: var(--text); }
#nogps p { font-size: 14px; color: var(--text2); line-height: 1.6; max-width: 280px; }
.retry-btn {
  margin-top: 8px; padding: 13px 32px;
  background: var(--accent); color: var(--bg);
  border: none; border-radius: 30px;
  font-family: var(--sans); font-weight: 700; font-size: 15px;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 0 20px rgba(0,229,255,0.3);
}
.retry-btn:hover { box-shadow: 0 0 30px rgba(0,229,255,0.5); transform: translateY(-1px); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 210px; left: 50%; transform: translateX(-50%);
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); padding: 9px 18px; border-radius: 30px;
  font-size: 12px; font-weight: 500; z-index: 600;
  opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
#toast.on { opacity: 1; }

/* ── SCAN LINE EFFECT (sutil) ── */
#map::after {
  content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="load-logo"><em>Gas</em><span>y</span></div>
  <div class="load-ring"></div>
  <div class="load-txt" id="load-txt">INICIALIZANDO GPS...</div>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
</div>

<!-- Header -->
<header id="hdr">
  <div id="logo">
    <div class="logo-dot"></div>
    <em>Gas</em><span>y</span>
  </div>
  <div id="fuel-wrap">
    <button class="fbtn on" onclick="setFuel('magna',this)">Magna</button>
    <button class="fbtn" onclick="setFuel('premium',this)">Premium</button>
    <button class="fbtn" onclick="setFuel('diesel',this)">Diésel</button>
  </div>
</header>

<!-- Mapa -->
<div id="map"></div>

<!-- GPS button -->
<button id="gpsbtn" onclick="centerUser()" aria-label="Mi ubicación">
  <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round">
    <circle cx="12" cy="12" r="3" fill="var(--accent)" fill-opacity="0.2"/>
    <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    <circle cx="12" cy="12" r="8" stroke-opacity="0.3"/>
  </svg>
</button>

<!-- Leyenda -->
<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--green);box-shadow:0 0 4px var(--green)"></div>Más barata</div>
  <div class="leg"><div class="leg-dot" style="background:var(--amber);box-shadow:0 0 4px var(--amber)"></div>Precio medio</div>
  <div class="leg"><div class="leg-dot" style="background:var(--red);box-shadow:0 0 4px var(--red)"></div>Más cara</div>
</div>

<!-- Panel inferior -->
<div id="panel">
  <div id="panel-handle"></div>
  <div id="stats">
    <div class="stat">
      <div class="stat-label">Más barata</div>
      <div class="stat-val" id="st-min">—</div>
      <div class="stat-sub" id="st-min-name">buscando...</div>
    </div>
    <div class="stat">
      <div class="stat-label">Promedio zona</div>
      <div class="stat-val" id="st-avg">—</div>
      <div class="stat-sub" id="st-count">— estaciones</div>
    </div>
    <div class="stat">
      <div class="stat-label">Más cara</div>
      <div class="stat-val" id="st-max">—</div>
      <div class="stat-sub" id="st-max-name">buscando...</div>
    </div>
  </div>
  <div id="cards"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Sin GPS -->
<div id="nogps">
  <div class="nogps-icon">📡</div>
  <h2>Activa tu ubicación</h2>
  <p>Gasy necesita tu GPS para mostrarte las gasolineras más baratas cerca de ti.</p>
  <button class="retry-btn" onclick="initGPS()">Activar GPS</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map, uMarker, uLat, uLng;
let fuel = 'magna';
let stations = [];
let markers = [];
let selId = null;

// Utils
const $ = id => document.getElementById(id);
const fmt = n => '$' + n.toFixed(2).replace('.', ',');
const dist = (a,b,c,d) => { const R=6371,f=(c-a)*Math.PI/180,g=(d-b)*Math.PI/180,h=Math.sin(f/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(g/2)**2; return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h)); };
const pclass = (p,mn,mx) => { const r=(mx-mn)||1,t=(p-mn)/r; return t<0.33?'g':t<0.66?'a':'r'; };

function setBar(p) { $('load-bar').style.width=p+'%'; }
function setTxt(t) { $('load-txt').textContent=t; }

function toast(msg) {
  const el=$('toast'); el.textContent=msg; el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),2200);
}

// Inicializar mapa
function initMap(lat,lng) {
  map = L.map('map',{zoomControl:true,attributionControl:false}).setView([lat,lng],14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

  const uIcon = L.divIcon({
    html:`<div class="umarker"><div class="umarker-dot"></div></div>`,
    className:'', iconSize:[20,20], iconAnchor:[10,10]
  });
  uMarker = L.marker([lat,lng],{icon:uIcon,zIndexOffset:1000}).addTo(map);
}

// Generar estaciones (reemplazar con CRE API en producción)
function makeStations(lat,lng) {
  const brands=['Pemex','BP','Shell','G500','Petro-7','Hidrosina','Orsan','Rendichicas','Oxxo Gas','Exxon'];
  const zones=['Norte','Sur','Centro','Oriente','Poniente','Insurgentes','Reforma','Periferico','Tlalpan','Xochimilco'];
  return Array.from({length:20},(_,i)=>{
    const dlat=(Math.random()-0.5)*0.065, dlng=(Math.random()-0.5)*0.065;
    const base=22.3+Math.random()*3.8;
    return {
      id:i,
      brand:brands[i%brands.length],
      name:`${brands[i%brands.length]} ${zones[i%zones.length]}`,
      lat:lat+dlat, lng:lng+dlng,
      addr:`${zones[i%zones.length]} ${Math.floor(Math.random()*1800+100)}, CDMX`,
      prices:{
        magna: parseFloat(base.toFixed(2)),
        premium: parseFloat((base+3.2+Math.random()*0.8).toFixed(2)),
        diesel: parseFloat((base+0.6+Math.random()*0.5).toFixed(2))
      }
    };
  });
}

// Marcadores en mapa
function renderMarkers(f) {
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  const prices=stations.map(s=>s.prices[f]);
  const mn=Math.min(...prices), mx=Math.max(...prices);
  const colors={g:'#00e676',a:'#ffab00',r:'#ff1744'};
  const glows={g:'rgba(0,230,118,0.5)',a:'rgba(255,171,0,0.5)',r:'rgba(255,23,68,0.5)'};

  stations.forEach(s=>{
    const pc=pclass(s.prices[f],mn,mx);
    const c=colors[pc], glow=glows[pc];
    const icon=L.divIcon({
      html:`<div style="position:relative;width:42px;height:50px;filter:drop-shadow(0 3px 8px ${glow})">
        <div style="width:42px;height:42px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${c};display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.15)">
          <div style="transform:rotate(45deg);font-family:'JetBrains Mono',monospace;font-weight:600;font-size:9px;color:#080c10;text-align:center;line-height:1.1">${s.prices[f].toFixed(2).replace('.',',')}</div>
        </div>
      </div>`,
      className:'', iconSize:[42,50], iconAnchor:[21,50]
    });

    const m=L.marker([s.lat,s.lng],{icon})
      .bindPopup(`<div class="pop">
        <div class="pop-brand">${s.brand}</div>
        <div class="pop-name">${s.name}</div>
        <div class="pop-prices">
          <div class="pop-row"><span class="pop-fuel">Magna</span><span class="pop-val">${fmt(s.prices.magna)}</span></div>
          <div class="pop-row"><span class="pop-fuel">Premium</span><span class="pop-val">${fmt(s.prices.premium)}</span></div>
          <div class="pop-row"><span class="pop-fuel">Diésel</span><span class="pop-val">${fmt(s.prices.diesel)}</span></div>
        </div>
        <div class="pop-addr">📍 ${s.addr}</div>
      </div>`,{maxWidth:240})
      .addTo(map);

    m.on('click',()=>selectStation(s.id));
    markers.push(m);
  });
}

// Stats panel
function updateStats(f) {
  const sorted=[...stations].sort((a,b)=>a.prices[f]-b.prices[f]);
  const prices=stations.map(s=>s.prices[f]);
  const mn=Math.min(...prices), mx=Math.max(...prices);
  const avg=prices.reduce((a,b)=>a+b,0)/prices.length;

  $('st-min').textContent=fmt(mn);
  $('st-min-name').textContent=sorted[0].brand;
  $('st-avg').textContent=fmt(avg);
  $('st-count').textContent=stations.length+' estaciones';
  $('st-max').textContent=fmt(mx);
  $('st-max-name').textContent=sorted[sorted.length-1].brand;
}

// Cards
function renderCards(f) {
  const prices=stations.map(s=>s.prices[f]);
  const mn=Math.min(...prices), mx=Math.max(...prices);
  const sorted=[...stations]
    .map(s=>({...s,d:dist(uLat,uLng,s.lat,s.lng)}))
    .sort((a,b)=>a.d-b.d).slice(0,12);

  const badgeTxt={g:'Más barata',a:'Normal',r:'Más cara'};
  $('cards').innerHTML=sorted.map(s=>{
    const pc=pclass(s.prices[f],mn,mx);
    const dstr=s.d<1?Math.round(s.d*1000)+'m':s.d.toFixed(1)+'km';
    return `<div class="card${selId===s.id?' sel':''}" id="c${s.id}" onclick="selectStation(${s.id})">
      <div class="card-brand">${s.brand}</div>
      <div class="card-price">${s.prices[f].toFixed(2).replace('.',',')} <span class="card-price-unit">MXN</span></div>
      <div class="card-dist">📍 ${dstr}</div>
      <div class="card-badge badge-${pc}">${badgeTxt[pc]}</div>
    </div>`;
  }).join('');
}

function selectStation(id) {
  if(selId!=null){const p=document.getElementById('c'+selId);if(p)p.classList.remove('sel');}
  selId=id;
  const el=document.getElementById('c'+id);
  if(el){el.classList.add('sel');el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}
  const s=stations.find(x=>x.id===id);
  if(s){map.flyTo([s.lat,s.lng],16,{animate:true,duration:0.7});markers[id]?.openPopup();}
}

function setFuel(f,btn) {
  fuel=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(stations.length){renderMarkers(f);renderCards(f);updateStats(f);}
}

function centerUser() {
  if(uLat) map.flyTo([uLat,uLng],14,{animate:true,duration:0.7});
  toast('Centrando en tu ubicación');
}

function loadStations(lat,lng) {
  setBar(60); setTxt('CARGANDO PRECIOS...');
  setTimeout(()=>{
    stations=makeStations(lat,lng);
    setBar(90); setTxt('PROCESANDO DATOS...');
    renderMarkers(fuel);
    renderCards(fuel);
    updateStats(fuel);
    setBar(100);
    setTimeout(()=>{
      $('loading').classList.add('out');
      setTimeout(()=>$('loading').style.display='none',500);
      toast('✓ '+stations.length+' gasolineras encontradas');
    },300);
  },700);
}

function initGPS() {
  $('nogps').classList.remove('show');
  setBar(20); setTxt('LOCALIZANDO GPS...');
  $('loading').style.display='flex'; $('loading').classList.remove('out');

  if(!navigator.geolocation){fallback();return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      uLat=pos.coords.latitude; uLng=pos.coords.longitude;
      setBar(40); setTxt('POSICIÓN DETECTADA...');
      initMap(uLat,uLng);
      loadStations(uLat,uLng);
    },
    err=>{
      if(err.code===1){$('loading').classList.add('out');setTimeout(()=>$('loading').style.display='none',500);$('nogps').classList.add('show');}
      else fallback();
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
  );
}

function fallback() {
  uLat=19.4326; uLng=-99.1332;
  setBar(40);
  initMap(uLat,uLng);
  loadStations(uLat,uLng);
  toast('Mostrando CDMX — activa GPS para tu zona');
}

window.addEventListener('load',()=>setTimeout(initGPS,200));
</script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
